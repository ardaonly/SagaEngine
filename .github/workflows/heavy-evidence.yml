# SPDX-License-Identifier: MPL-2.0
name: Heavy Test Evidence

on:
  schedule:
    - cron: "0 2 * * *"
    - cron: "0 3 * * 0"
  workflow_dispatch:
    inputs:
      suite:
        description: Evidence suite to run
        required: true
        default: integration-replication
        type: choice
        options:
          - integration-replication
          - stress
          - gpu-preflight

permissions:
  contents: read

concurrency:
  group: heavy-evidence-${{ github.event.schedule }}-${{ inputs.suite }}-${{ github.ref }}
  cancel-in-progress: false

env:
  CONAN_VERSION: "2.30.0"
  CMAKE_VERSION: "3.28.1"

jobs:
  integration-replication:
    name: Nightly integration and replication
    if: github.event.schedule == '0 2 * * *' || inputs.suite == 'integration-replication'
    runs-on: ubuntu-24.04
    timeout-minutes: 180

    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          submodules: recursive
      - name: Read version and install build tools
        shell: bash
        run: |
          version="$(tr -d '\r\n' < VERSION)"
          echo "SAGA_ENGINE_VERSION=$version" >> "$GITHUB_ENV"
          echo "SAGA_BUILD_DIR=build/RelWithDebInfo-$version" >> "$GITHUB_ENV"
          python3 -m pip install --user --disable-pip-version-check \
            "conan==$CONAN_VERSION" "cmake==$CMAKE_VERSION"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Restore Conan cache
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: ~/.conan2/p
          key: heavy-conan-linux-${{ hashFiles('conanfile.py', 'profiles/**', 'VERSION') }}
          restore-keys: heavy-conan-linux-
      - name: Configure and build integration targets
        shell: bash
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          conan profile detect --force
          conan install . --build=missing -s build_type=RelWithDebInfo \
            -c tools.build:jobs=2 \
            -c tools.system.package_manager:mode=install \
            -c tools.system.package_manager:sudo=True
          source "$SAGA_BUILD_DIR/generators/conanbuild.sh"
          cmake --preset linux-gcc -DCMAKE_C_COMPILER_LAUNCHER= -DCMAKE_CXX_COMPILER_LAUNCHER=
          cmake --build "$SAGA_BUILD_DIR" --parallel 2 --target SagaIntegrationTests SagaReplicationTests
      - name: Run IntegrationTests and ReplicationTests
        shell: bash
        run: |
          mkdir -p artifacts/heavy
          ctest --test-dir "$SAGA_BUILD_DIR" --output-on-failure -j1 \
            --output-junit artifacts/heavy/integration-replication.xml \
            -R '^(IntegrationTests|ReplicationTests)$'
      - name: Upload integration evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: integration-replication-${{ github.run_attempt }}
          path: |
            artifacts/heavy/integration-replication.xml
            ${{ env.SAGA_BUILD_DIR }}/Testing/Temporary/
          if-no-files-found: warn
          retention-days: 30
      - name: Publish integration summary
        if: always()
        shell: bash
        run: |
          echo "## Nightly integration and replication" >> "$GITHUB_STEP_SUMMARY"
          echo "IntegrationTests and ReplicationTests ran serially; JUnit and failure logs are retained for 30 days." >> "$GITHUB_STEP_SUMMARY"

  stress:
    name: Weekly stress
    if: github.event.schedule == '0 3 * * 0' || inputs.suite == 'stress'
    runs-on: ubuntu-24.04
    timeout-minutes: 240

    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          submodules: recursive
      - name: Read version and install build tools
        shell: bash
        run: |
          version="$(tr -d '\r\n' < VERSION)"
          echo "SAGA_ENGINE_VERSION=$version" >> "$GITHUB_ENV"
          echo "SAGA_BUILD_DIR=build/RelWithDebInfo-$version" >> "$GITHUB_ENV"
          python3 -m pip install --user --disable-pip-version-check \
            "conan==$CONAN_VERSION" "cmake==$CMAKE_VERSION"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Restore Conan cache
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: ~/.conan2/p
          key: stress-conan-linux-${{ hashFiles('conanfile.py', 'profiles/**', 'VERSION') }}
          restore-keys: stress-conan-linux-
      - name: Configure and build stress target
        shell: bash
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          conan profile detect --force
          conan install . --build=missing -s build_type=RelWithDebInfo \
            -c tools.build:jobs=2 \
            -c tools.system.package_manager:mode=install \
            -c tools.system.package_manager:sudo=True
          source "$SAGA_BUILD_DIR/generators/conanbuild.sh"
          cmake --preset linux-gcc -DCMAKE_C_COMPILER_LAUNCHER= -DCMAKE_CXX_COMPILER_LAUNCHER=
          cmake --build "$SAGA_BUILD_DIR" --parallel 2 --target SagaStressTests
      - name: Run StressTests serially
        shell: bash
        run: |
          mkdir -p artifacts/stress
          ctest --test-dir "$SAGA_BUILD_DIR" --output-on-failure -j1 \
            --output-junit artifacts/stress/stress.xml \
            -R '^StressTests$'
      - name: Upload stress evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: stress-${{ github.run_attempt }}
          path: |
            artifacts/stress/
            ${{ env.SAGA_BUILD_DIR }}/Testing/Temporary/
          if-no-files-found: warn
          retention-days: 90
      - name: Publish stress summary
        if: always()
        shell: bash
        run: |
          echo "## Weekly stress" >> "$GITHUB_STEP_SUMMARY"
          echo "StressTests ran serially with a four-hour job limit; evidence is retained for 90 days." >> "$GITHUB_STEP_SUMMARY"

  gpu-preflight:
    name: GPU evidence preflight
    if: inputs.suite == 'gpu-preflight'
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      - name: Record unavailable GPU execution environment
        shell: bash
        run: |
          mkdir -p artifacts/gpu
          printf '%s\n' \
            '{' \
            '  "status": "blocked",' \
            '  "reason": "No trusted self-hosted runner with the saga-gpu label is configured.",' \
            '  "executed": false' \
            '}' > artifacts/gpu/preflight.json
          echo "::error title=GPU evidence blocked::No trusted saga-gpu runner is configured; GPU executables were not run."
          exit 1
      - name: Upload GPU preflight evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: gpu-preflight-${{ github.run_attempt }}
          path: artifacts/gpu/preflight.json
          if-no-files-found: error
          retention-days: 90
      - name: Publish GPU preflight summary
        if: always()
        shell: bash
        run: |
          {
            echo "## GPU evidence: BLOCKED"
            echo
            echo "No trusted self-hosted runner carrying the saga-gpu label is configured."
            echo "No GPU executable ran and this dispatch intentionally does not report success."
          } >> "$GITHUB_STEP_SUMMARY"
