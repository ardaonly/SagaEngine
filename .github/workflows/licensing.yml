name: Licensing Policy

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  licensing-policy:
    name: License foundation and policy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Select comparison base
        id: base
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PUSH_BEFORE_SHA: ${{ github.event.before }}
        run: |
          set -euo pipefail

          zero_sha="0000000000000000000000000000000000000000"

          if [[ "$EVENT_NAME" == "pull_request" && -n "${PR_BASE_SHA:-}" ]]; then
            base_ref="$PR_BASE_SHA"
          elif [[ "$EVENT_NAME" == "push" \
               && -n "${PUSH_BEFORE_SHA:-}" \
               && "$PUSH_BEFORE_SHA" != "$zero_sha" ]]; then
            base_ref="$PUSH_BEFORE_SHA"
          else
            base_ref="$(git rev-parse HEAD^ 2>/dev/null || git rev-parse HEAD)"
          fi

          git cat-file -e "${base_ref}^{commit}"
          echo "base_ref=$base_ref" >> "$GITHUB_OUTPUT"
          echo "Comparison base: $base_ref"

      - name: Check licensing tool syntax
        run: python3 -m py_compile Tools/Licensing/*.py

      - name: Verify DCO sign-offs
        shell: bash
        env:
          BASE_REF: ${{ steps.base.outputs.base_ref }}
        run: |
          set -euo pipefail

          failures=0
          checked=0

          while IFS= read -r commit; do
            [[ -n "$commit" ]] || continue

            parent_line="$(git rev-list --parents -n 1 "$commit")"
            parent_count=$(( $(wc -w <<< "$parent_line") - 1 ))

            # Pull-request checkout refs may contain a synthetic merge commit.
            # The contribution commits themselves remain subject to DCO.
            if (( parent_count > 1 )); then
              echo "Skipping merge commit: $commit"
              continue
            fi

            checked=$((checked + 1))

            if ! git show -s --format=%B "$commit" |
              grep -Eiq                 '^Signed-off-by:[[:space:]]+.+[[:space:]]+<[^<>[:space:]]+@[^<>[:space:]]+>[[:space:]]*$'
            then
              echo "::error title=DCO sign-off missing::Commit $commit does not contain a valid Signed-off-by trailer."
              failures=$((failures + 1))
            else
              echo "DCO sign-off present: $commit"
            fi
          done < <(git rev-list --reverse "${BASE_REF}..HEAD")

          if (( failures > 0 )); then
            echo "$failures commit(s) failed DCO validation."
            exit 1
          fi

          echo "DCO validation passed for $checked non-merge commit(s)."


      - name: Verify canonical license foundation
        run: |
          python3 Tools/Licensing/verify_license_texts.py \
            --strict-cleanup

      - name: Validate repository license policy
        run: |
          python3 Tools/Licensing/validate_license_policy.py \
            --report \
            --base-ref "${{ steps.base.outputs.base_ref }}"
