name: Licensing Policy

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  licensing-policy:
    name: License foundation and policy
    runs-on: ubuntu-latest
    outputs:
      base_ref: ${{ steps.base.outputs.base_ref }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Select comparison base
        id: base
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PUSH_BEFORE_SHA: ${{ github.event.before }}
        run: |
          set -euo pipefail

          zero_sha="0000000000000000000000000000000000000000"

          if [[ "$EVENT_NAME" == "pull_request" && -n "${PR_BASE_SHA:-}" ]]; then
            base_ref="$PR_BASE_SHA"
          elif [[ "$EVENT_NAME" == "push" \
               && -n "${PUSH_BEFORE_SHA:-}" \
               && "$PUSH_BEFORE_SHA" != "$zero_sha" ]]; then
            base_ref="$PUSH_BEFORE_SHA"
          else
            base_ref="$(git rev-parse HEAD^ 2>/dev/null || git rev-parse HEAD)"
          fi

          git cat-file -e "${base_ref}^{commit}"
          echo "base_ref=$base_ref" >> "$GITHUB_OUTPUT"
          echo "Comparison base: $base_ref"

      - name: Check licensing tool syntax
        run: python3 -m py_compile Tools/Licensing/*.py

      - name: Verify DCO sign-offs
        shell: bash
        env:
          BASE_REF: ${{ steps.base.outputs.base_ref }}
        run: |
          set -euo pipefail

          failures=0
          checked=0

          while IFS= read -r commit; do
            [[ -n "$commit" ]] || continue

            parent_line="$(git rev-list --parents -n 1 "$commit")"
            parent_count=$(( $(wc -w <<< "$parent_line") - 1 ))

            # Pull-request checkout refs may contain a synthetic merge commit.
            # The contribution commits themselves remain subject to DCO.
            if (( parent_count > 1 )); then
              echo "Skipping merge commit: $commit"
              continue
            fi

            checked=$((checked + 1))

            if ! git show -s --format=%B "$commit" |
              grep -Eiq                 '^Signed-off-by:[[:space:]]+.+[[:space:]]+<[^<>[:space:]]+@[^<>[:space:]]+>[[:space:]]*$'
            then
              echo "::error title=DCO sign-off missing::Commit $commit does not contain a valid Signed-off-by trailer."
              failures=$((failures + 1))
            else
              echo "DCO sign-off present: $commit"
            fi
          done < <(git rev-list --reverse "${BASE_REF}..HEAD")

          if (( failures > 0 )); then
            echo "$failures commit(s) failed DCO validation."
            exit 1
          fi

          echo "DCO validation passed for $checked non-merge commit(s)."


      - name: Verify canonical license foundation
        run: |
          python3 Tools/Licensing/verify_license_texts.py \
            --strict-cleanup

      - name: Validate repository license policy
        run: |
          python3 Tools/Licensing/validate_license_policy.py \
            --report \
            --base-ref "${{ steps.base.outputs.base_ref }}"

  configured-graph:
    name: Configured CMake licensing graph
    needs: licensing-policy
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Read project version
        shell: bash
        run: |
          set -euo pipefail

          version="$(tr -d '\r\n' < VERSION)"
          test -n "$version"

          echo "SAGA_ENGINE_VERSION=$version" >> "$GITHUB_ENV"
          echo "SAGA_BUILD_DIR=build/RelWithDebInfo-$version" >> "$GITHUB_ENV"

          echo "Version: $version"
          echo "Build directory: build/RelWithDebInfo-$version"

      - name: Install Conan
        shell: bash
        run: |
          set -euo pipefail

          python3 -m pip install --user \
            --disable-pip-version-check \
            "conan==2.30.0"

          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          "$HOME/.local/bin/conan" --version
          "$HOME/.local/bin/conan" remote list

      - name: Configure Conan profile
        shell: bash
        run: |
          set -euo pipefail
          conan profile detect --force

      - name: Resolve build dependencies
        shell: bash
        run: |
          set -euo pipefail

          conan install . \
            --build=missing \
            -s build_type=RelWithDebInfo \
            -o "&:with_sde=False" \
            -c tools.build:jobs=2 \
            -c tools.system.package_manager:mode=install \
            -c tools.system.package_manager:sudo=True

      - name: Prepare CMake File API query
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p "$SAGA_BUILD_DIR/.cmake/api/v1/query"
          touch "$SAGA_BUILD_DIR/.cmake/api/v1/query/codemodel-v2"

      - name: Configure SagaEngine graph
        shell: bash
        run: |
          set -euo pipefail

          source "$SAGA_BUILD_DIR/generators/conanbuild.sh"

          cmake --preset linux-gcc \
            -DCMAKE_C_COMPILER_LAUNCHER= \
            -DCMAKE_CXX_COMPILER_LAUNCHER=

          test -d "$SAGA_BUILD_DIR/.cmake/api/v1/reply"

      - name: Validate configured licensing graph
        shell: bash
        env:
          BASE_REF: ${{ needs.licensing-policy.outputs.base_ref }}
        run: |
          set -euo pipefail

          python3 Tools/Licensing/validate_license_policy.py \
            --report \
            --base-ref "$BASE_REF" \
            --cmake-build-dir "$SAGA_BUILD_DIR"
