name: SagaEngine CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  boundary-observation:
    name: Tooling and boundary checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check Python tooling syntax
        run: |
          python3 -m py_compile \
            Tools/common/platform_detect.py \
            Tools/scripts/check_public_private_boundary.py \
            Tools/scripts/check_qt_boundary.py \
            Tools/scripts/check_engine_server_boundary.py \
            Tools/scripts/export_tool_mirrors.py \
            Tools/scripts/report_boundary_status.py \
            Tools/Forge/build.py \
            Tools/SagaTools/setup.py

      - name: Run boundary report
        run: python3 Tools/scripts/report_boundary_status.py --repo-root .

      - name: Enforce Qt boundary
        run: python3 Tools/scripts/check_qt_boundary.py .

      - name: Guard Engine server boundary debt
        run: python3 Tools/scripts/check_engine_server_boundary.py --repo-root .

      - name: Guard Public Private boundary
        run: python3 Tools/scripts/check_public_private_boundary.py --repo-root .

  build:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: sagaforge
        shell: pwsh

    steps:
      - name: Checkout
        uses: actions/checkout@v4
