name: SagaEngine CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: sagaengine-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: windows-msvc-14.38
    runs-on: windows-2022
    env:
      SAGA_CI_MODE: "true"

    defaults:
      run:
        working-directory: sagaforge
        shell: pwsh

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Cache
        uses: actions/cache@v4
        with:
          path: |
            sagaforge/.toolchain
            sagaforge/cache/sccache
            ~/.conan2
            sagaforge/Build/windows-msvc-14.38
          key: ${{ runner.os }}-windows-msvc-${{ hashFiles('sagaforge/conan.lock', 'sagaforge/conanfile.py', 'sagaforge/CMakePresets.json', 'sagaforge/cmake/**') }}
          restore-keys: |
            ${{ runner.os }}-windows-msvc-

      - name: Fix VS edition path
        shell: pwsh
        run: |
          $enterprise = "C:\Program Files\Microsoft Visual Studio\2022\Enterprise"
          $community  = "C:\Program Files\Microsoft Visual Studio\2022\Community"
          if ((Test-Path $enterprise) -and -not (Test-Path $community)) {
            cmd /c "mklink /J `"$community`" `"$enterprise`""
          }

      - name: Lock
        run: .\build.ps1 lock -Profile windows-msvc

      - name: Setup
        run: .\build.ps1 setup -Profile windows-msvc -Preset windows-msvc-14.38

      - name: Build
        run: .\build.ps1 build -Profile windows-msvc -Preset windows-msvc-14.38

      - name: Test
        run: .\build.ps1 test -Preset windows-msvc-14.38

      - name: sccache stats
        if: always()
        run: |
          $sccache = "cache\sccache\sccache.exe"
          if (Test-Path $sccache) { & $sccache --show-stats }

      - name: Upload artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: sagaengine-windows-msvc-${{ github.sha }}
          path: sagaforge/Build/windows-msvc-14.38/
          retention-days: 7