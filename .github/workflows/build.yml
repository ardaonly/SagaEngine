name: SagaEngine Build
on:
  push:
    branches: [main, develop, release/*]
  pull_request:
    branches: [main, develop]

env:
  CONAN_VERSION: "2.0.17"
  SAGA_CI_MODE: "true"

jobs:
  validate:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Verify Lockfile Tracked
        run: git ls-files --error-unmatch conan.lock
      
      - name: Verify Lockfile Not Modified
        run: git diff --exit-code -- conan.lock
      
      - name: Validate Lockfile (Conan 2)
        run: |
          pip install conan==${{ env.CONAN_VERSION }}
          python Tools/scripts/verify_lockfile.py --strict

  build:
    needs: validate
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-2022
            profile: windows-msvc-14.38
            preset: windows-msvc-14.38
          - os: ubuntu-22.04
            profile: linux-gcc-13
            preset: linux-gcc-13
          - os: macos-14
            profile: macos-clang-15
            preset: macos-clang-15
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install Conan
        run: python -m pip install --user conan==${{ env.CONAN_VERSION }}
      
      - name: Setup
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then
            ./build.ps1 setup -Profile ${{ matrix.profile }}
          else
            ./build.sh setup -p ${{ matrix.profile }}
          fi
        env:
          SAGA_CI_MODE: "true"
      
      - name: Build (--build=never in CI)
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then
            ./build.ps1 build -Profile ${{ matrix.profile }}
          else
            ./build.sh build -p ${{ matrix.profile }}
          fi
        env:
          SAGA_CI_MODE: "true"
      
      - name: Test
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then
            ./build.ps1 test -Profile ${{ matrix.profile }}
          else
            ./build.sh test -p ${{ matrix.profile }}
          fi