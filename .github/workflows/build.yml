name: SagaEngine CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  boundary-observation:
    name: Tooling and boundary checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check Python tooling syntax
        run: |
          python3 -m py_compile \
            Tools/common/platform_detect.py \
            Tools/Developer/BoundaryCheck/check_public_private_boundary.py \
            Tools/Developer/BoundaryCheck/check_qt_boundary.py \
            Tools/Developer/BoundaryCheck/check_engine_server_boundary.py \
            Tools/Developer/RepoAudit/saga_repo_xray.py \
            Tools/Developer/RepoAudit/export_tool_mirrors.py \
            Tools/Developer/BoundaryCheck/report_boundary_status.py \
            Tools/Forge/build.py \
            Tools/SagaTools/setup.py

      - name: Run boundary report
        run: python3 Tools/Developer/BoundaryCheck/report_boundary_status.py --repo-root .

      - name: Enforce Qt boundary
        run: python3 Tools/Developer/BoundaryCheck/check_qt_boundary.py .

      - name: Guard Engine server boundary debt
        run: python3 Tools/Developer/BoundaryCheck/check_engine_server_boundary.py --repo-root .

      - name: Guard Public Private boundary
        run: python3 Tools/Developer/BoundaryCheck/check_public_private_boundary.py --repo-root .

  repository-contracts:
    name: Repository contract tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Run Python contract tests
        run: |
          python3 -m unittest discover -s Tools/Licensing/tests -p 'test_*.py'
          python3 -m unittest discover -s Tools/Developer/RepoAudit/tests -p 'test_*.py'
          python3 Tools/SagaProjectKit/tests/test_sagaprojectkit_cli.py
          python3 Tools/SagaPackager/tests/test_sagapack_cli.py
          python3 Tools/SagaScript/tests/test_sagascript_cli.py
          python3 Tools/SagaScript/tests/test_sagascript_toolchain_check.py

      - name: Verify generated wiki
        run: scripts/wiki verify

      - name: Verify licensing texts
        run: python3 Tools/Licensing/verify_license_texts.py --strict-cleanup

      - name: Reject whitespace errors
        run: git diff --check
