name: SagaEngine CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: sagaengine-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: windows-msvc-14.38
    runs-on: windows-2022
    env:
      SAGA_CI_MODE: "true"

    defaults:
      run:
        working-directory: sagaforge
        shell: pwsh

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Cache
        uses: actions/cache@v4
        with:
          path: |
            sagaforge/.toolchain
            sagaforge/cache/sccache
            ~/.conan2
            sagaforge/Build/windows-msvc-14.38
          key: ${{ runner.os }}-windows-msvc-${{ hashFiles('sagaforge/conan.lock', 'sagaforge/conanfile.py', 'sagaforge/CMakePresets.json', 'sagaforge/cmake/**') }}
          restore-keys: |
            ${{ runner.os }}-windows-msvc-

      - name: Install MSVC 14.38 toolset
        shell: pwsh
        run: |
          $vswhere   = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $installer = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vs_installer.exe"
          $vsPath    = & $vswhere -latest -products * -property installationPath 2>$null | Select-Object -First 1
          if (-not $vsPath) { throw "VS installation not found" }
          & $installer modify `
            --installPath "$vsPath" `
            --add Microsoft.VisualStudio.Component.VC.14.38.17.8.x86.x64 `
            --quiet --norestart --noUpdateInstaller
          if ($LASTEXITCODE -ne 0) { throw "Failed to install MSVC 14.38 toolset" }

      - name: Lock
        run: .\build.ps1 lock -Profile windows-msvc

      - name: Setup
        run: .\build.ps1 setup -Profile windows-msvc -Preset windows-msvc-14.38

      - name: Build
        run: .\build.ps1 build -Profile windows-msvc -Preset windows-msvc-14.38

      - name: Test
        run: .\build.ps1 test -Preset windows-msvc-14.38

      - name: sccache stats
        if: always()
        run: |
          $sccache = "cache\sccache\sccache.exe"
          if (Test-Path $sccache) { & $sccache --show-stats }

      - name: Upload artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: sagaengine-windows-msvc-${{ github.sha }}
          path: sagaforge/Build/windows-msvc-14.38/
          retention-days: 7