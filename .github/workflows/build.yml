# SPDX-License-Identifier: MPL-2.0
name: C++ Evidence

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: saga-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CONAN_VERSION: "2.30.0"
  CMAKE_VERSION: "3.28.1"

jobs:
  cpp-linux-all-safe:
    name: C++ Linux all-safe
    runs-on: ubuntu-24.04
    timeout-minutes: 150

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: recursive

      - name: Read project version
        shell: bash
        run: |
          version="$(tr -d '\r\n' < VERSION)"
          test -n "$version"
          echo "SAGA_ENGINE_VERSION=$version" >> "$GITHUB_ENV"
          echo "SAGA_BUILD_DIR=build/RelWithDebInfo-$version" >> "$GITHUB_ENV"

      - name: Set up .NET 10 for managed runtime tests
        uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68 # v6.0.0
        with:
          dotnet-version: 10.0.x

      - name: Restore Conan cache
        id: linux-conan-cache
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.conan2/p
          key: conan-linux-${{ hashFiles('conanfile.py', 'profiles/**', 'VERSION') }}
          restore-keys: conan-linux-

      - name: Install pinned build tools
        shell: bash
        run: |
          python3 -m pip install --user --disable-pip-version-check \
            "conan==$CONAN_VERSION" "cmake==$CMAKE_VERSION"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Resolve dependencies and configure
        shell: bash
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          conan profile detect --force
          conan install . --build=missing \
            -s build_type=RelWithDebInfo \
            -c tools.build:jobs=2 \
            -c tools.system.package_manager:mode=install \
            -c tools.system.package_manager:sudo=True
          source "$SAGA_BUILD_DIR/generators/conanbuild.sh"
          cmake --preset linux-gcc \
            -DCMAKE_C_COMPILER_LAUNCHER= \
            -DCMAKE_CXX_COMPILER_LAUNCHER=

      - name: Save resolved Linux Conan cache
        if: steps.linux-conan-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.conan2/p
          key: conan-linux-${{ hashFiles('conanfile.py', 'profiles/**', 'VERSION') }}

      - name: Build Linux runtime module tests
        shell: bash
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          source "$SAGA_BUILD_DIR/generators/conanbuild.sh"
          cmake --build "$SAGA_BUILD_DIR" --parallel 2 --target \
            SagaCoreModuleTests SagaMathModuleTests SagaDiagnosticsModuleTests \
            SagaECSModuleTests SagaAssetsModuleTests SagaResourcesModuleTests \
            SagaInputModuleTests SagaAudioModuleTests SagaUIModuleTests \
            SagaScriptingModuleTests SagaNetworkingModuleTests \
            SagaReplicationModuleTests SagaPersistenceModuleTests \
            SagaSimulationModuleTests SagaWorldModuleTests \
            SagaServerAuthorityModuleTests SagaSagaRuntimeModuleTests

      - name: Build Linux editor module tests
        shell: bash
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          source "$SAGA_BUILD_DIR/generators/conanbuild.sh"
          cmake --build "$SAGA_BUILD_DIR" --parallel 2 --target \
            SagaEditorCoreModuleTests SagaEditorFrameworkModuleTests \
            SagaEditorQtModuleTests SagaEditorAuthoringModuleTests \
            SagaVisualBlocksEditorModuleTests SagaEditorCollaborationModuleTests \
            SagaEditorExperimentalModuleTests SagaSagaEditorLabModuleTests

      - name: Build Linux core and architecture tests
        shell: bash
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          source "$SAGA_BUILD_DIR/generators/conanbuild.sh"
          cmake --build "$SAGA_BUILD_DIR" --parallel 2 --target \
            SagaUnitTests SagaDiligentWhiteboxTests \
            SagaGraphicsPublicConsumerLinkTest SagaArchitectureTests

      - name: Build Linux focused runtime tests
        shell: bash
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          source "$SAGA_BUILD_DIR/generators/conanbuild.sh"
          cmake --build "$SAGA_BUILD_DIR" --parallel 2 --target \
            SagaStressArenaTests SagaStressArena SagaChaosLabTests SagaChaosLab \
            SagaStateCheckTests MultiplayerSandboxHeadless MultiplayerSandboxHeadlessTests \
            AssetIdentityRuntimeContractTests AssetIdentityManifestWriterTests \
            AssetManifestWriterTests PackageManifestWriterTests \
            GeneratedRuntimeSmokeManifestTests GeneratedRuntimeSmokePackageTests \
            RuntimeAssetStartupBootstrapTests ScriptBindingRuntimeTests \
            CSharpScriptHostTests CSharpGameplayProofTests \
            StarterArenaRuntimeSmokeTests StarterArenaPlayableTests

      - name: Build Linux product tests
        shell: bash
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          source "$SAGA_BUILD_DIR/generators/conanbuild.sh"
          cmake --build "$SAGA_BUILD_DIR" --parallel 2 --target \
            SagaProductTests SagaLauncherUiTests

      - name: Run SagaPackager native smoke contract
        env:
          SAGA_RUN_PACKAGED_NATIVE_SMOKE: "1"
          SAGA_NATIVE_BIN_DIR: ${{ github.workspace }}/${{ env.SAGA_BUILD_DIR }}/bin
        run: python3 Tools/SagaPackager/tests/test_sagapack_cli.py

      - name: Run PR-safe CTest suite
        shell: bash
        run: |
          mkdir -p artifacts/linux
          ctest --test-dir "$SAGA_BUILD_DIR" \
            --output-on-failure \
            --output-junit artifacts/linux/ctest-all-safe.xml \
            --label-exclude 'stress|slow|load|timing-sensitive|long-running|gpu|display-required|install' \
            -j2

      - name: Upload Linux test evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: cpp-linux-all-safe-${{ github.run_attempt }}
          path: |
            artifacts/linux/ctest-all-safe.xml
            ${{ env.SAGA_BUILD_DIR }}/Testing/Temporary/
          if-no-files-found: warn
          retention-days: 14

      - name: Publish Linux summary
        if: always()
        shell: bash
        run: |
          {
            echo "## C++ Linux all-safe"
            echo
            echo "Excluded labels: stress, slow, load, timing-sensitive, long-running, gpu, display-required, install."
            echo "The installed SDK contract is owned by the configured licensing graph job."
            echo "JUnit and CTest failure logs are attached even when the test step fails."
          } >> "$GITHUB_STEP_SUMMARY"

  cpp-windows-core:
    name: C++ Windows core
    runs-on: windows-2022
    timeout-minutes: 150

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: recursive

      - name: Read project version
        shell: pwsh
        run: |
          $version = (Get-Content VERSION -Raw).Trim()
          if (-not $version) { throw "VERSION is empty" }
          "SAGA_ENGINE_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Append
          "SAGA_BUILD_DIR=Build/windows-msvc-14.38" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Set up .NET 10 for managed runtime tests
        uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68 # v6.0.0
        with:
          dotnet-version: 10.0.x

      - name: Restore Conan cache
        id: windows-conan-cache
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.conan2/p
          key: conan-windows-${{ env.CONAN_VERSION }}-${{ env.CMAKE_VERSION }}-${{ hashFiles('conanfile.py', 'profiles/**', 'VERSION') }}
          restore-keys: conan-windows-

      - name: Install pinned build tools
        shell: pwsh
        run: python -m pip install --disable-pip-version-check "conan==$env:CONAN_VERSION" "cmake==$env:CMAKE_VERSION"

      - name: Detect and compose Windows Conan profiles
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $PSNativeCommandUseErrorActionPreference = $true
          conan profile detect --force --name windows-runner
          conan profile show `
            -pr:h windows-runner `
            -pr:h profiles/ci/windows-msvc `
            -pr:b windows-runner `
            -pr:b profiles/ci/windows-msvc

      - name: Resolve Windows dependencies
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $PSNativeCommandUseErrorActionPreference = $true
          conan install . --output-folder "$env:SAGA_BUILD_DIR" --build=missing `
            -pr:h windows-runner `
            -pr:h profiles/ci/windows-msvc `
            -pr:b windows-runner `
            -pr:b profiles/ci/windows-msvc
          $toolchains = @(Get-ChildItem -Path $env:SAGA_BUILD_DIR -Filter conan_toolchain.cmake -Recurse -File)
          if ($toolchains.Count -ne 1) {
            $found = ($toolchains | ForEach-Object FullName) -join ", "
            throw "Expected exactly one Conan toolchain under $env:SAGA_BUILD_DIR; found $($toolchains.Count): $found"
          }
          $conanGenerators = $toolchains[0].Directory.FullName
          "SAGA_CONAN_GENERATORS=$conanGenerators" | Out-File -FilePath $env:GITHUB_ENV -Append
          Write-Host "Resolved Conan generators: $conanGenerators"

      - name: Save resolved Windows Conan cache
        if: steps.windows-conan-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.conan2/p
          key: conan-windows-${{ env.CONAN_VERSION }}-${{ env.CMAKE_VERSION }}-${{ hashFiles('conanfile.py', 'profiles/**', 'VERSION') }}

      - name: Configure Windows graph
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $PSNativeCommandUseErrorActionPreference = $true
          $conanBuild = Join-Path $env:SAGA_CONAN_GENERATORS "conanbuild.ps1"
          $conanToolchain = Join-Path $env:SAGA_CONAN_GENERATORS "conan_toolchain.cmake"
          if (-not (Test-Path $conanBuild)) { throw "Missing Conan build environment: $conanBuild" }
          if (-not (Test-Path $conanToolchain)) { throw "Missing Conan toolchain: $conanToolchain" }
          . $conanBuild
          cmake -S . -B "$env:SAGA_BUILD_DIR" -G Ninja `
            -DCMAKE_BUILD_TYPE=RelWithDebInfo `
            -DCMAKE_POLICY_DEFAULT_CMP0091=NEW `
            "-DCMAKE_TOOLCHAIN_FILE=$conanToolchain" `
            -DCMAKE_C_COMPILER_LAUNCHER= `
            -DCMAKE_CXX_COMPILER_LAUNCHER=

      - name: Build Windows runtime module tests
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $PSNativeCommandUseErrorActionPreference = $true
          . (Join-Path $env:SAGA_CONAN_GENERATORS "conanbuild.ps1")
          cmake --build "$env:SAGA_BUILD_DIR" --parallel 2 --target `
            SagaCoreModuleTests SagaMathModuleTests SagaDiagnosticsModuleTests `
            SagaECSModuleTests SagaAssetsModuleTests SagaResourcesModuleTests `
            SagaInputModuleTests SagaAudioModuleTests SagaUIModuleTests `
            SagaScriptingModuleTests SagaNetworkingModuleTests `
            SagaReplicationModuleTests SagaPersistenceModuleTests `
            SagaSimulationModuleTests SagaWorldModuleTests `
            SagaServerAuthorityModuleTests SagaSagaRuntimeModuleTests

      - name: Build Windows editor module tests
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $PSNativeCommandUseErrorActionPreference = $true
          . (Join-Path $env:SAGA_CONAN_GENERATORS "conanbuild.ps1")
          cmake --build "$env:SAGA_BUILD_DIR" --parallel 2 --target `
            SagaEditorCoreModuleTests SagaEditorFrameworkModuleTests `
            SagaEditorQtModuleTests SagaEditorAuthoringModuleTests `
            SagaVisualBlocksEditorModuleTests SagaEditorCollaborationModuleTests `
            SagaEditorExperimentalModuleTests SagaSagaEditorLabModuleTests

      - name: Build Windows core and architecture tests
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $PSNativeCommandUseErrorActionPreference = $true
          . (Join-Path $env:SAGA_CONAN_GENERATORS "conanbuild.ps1")
          cmake --build "$env:SAGA_BUILD_DIR" --parallel 2 --target `
            SagaUnitTests SagaArchitectureTests

      - name: Build Windows focused runtime tests
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $PSNativeCommandUseErrorActionPreference = $true
          . (Join-Path $env:SAGA_CONAN_GENERATORS "conanbuild.ps1")
          cmake --build "$env:SAGA_BUILD_DIR" --parallel 2 --target `
            SagaStressArenaTests SagaStressArena SagaChaosLabTests SagaChaosLab `
            SagaStateCheckTests MultiplayerSandboxHeadlessTests `
            AssetIdentityRuntimeContractTests AssetIdentityManifestWriterTests `
            AssetManifestWriterTests PackageManifestWriterTests `
            GeneratedRuntimeSmokeManifestTests GeneratedRuntimeSmokePackageTests `
            RuntimeAssetStartupBootstrapTests ScriptBindingRuntimeTests `
            CSharpScriptHostTests CSharpGameplayProofTests `
            StarterArenaRuntimeSmokeTests StarterArenaPlayableTests

      - name: Build Windows product tests
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $PSNativeCommandUseErrorActionPreference = $true
          . (Join-Path $env:SAGA_CONAN_GENERATORS "conanbuild.ps1")
          cmake --build "$env:SAGA_BUILD_DIR" --parallel 2 --target SagaProductTests

      - name: Run Windows unit and architecture tests
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $PSNativeCommandUseErrorActionPreference = $true
          $conanRun = Join-Path $env:SAGA_CONAN_GENERATORS "conanrun.ps1"
          if (Test-Path $conanRun) { . $conanRun }
          New-Item -ItemType Directory -Force artifacts/windows | Out-Null
          ctest --test-dir "$env:SAGA_BUILD_DIR" `
            --output-on-failure `
            --output-junit artifacts/windows/ctest-core.xml `
            --label-regex "unit|architecture" `
            --label-exclude "integration|timing-sensitive|slow|stress|gpu|whitebox-private" `
            -j2

      - name: Upload Windows test evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: cpp-windows-core-${{ github.run_attempt }}
          path: |
            artifacts/windows/ctest-core.xml
            ${{ env.SAGA_BUILD_DIR }}/Testing/Temporary/
          if-no-files-found: warn
          retention-days: 14

      - name: Publish Windows summary
        if: always()
        shell: pwsh
        run: |
          $testEvidence = "artifacts/windows/ctest-core.xml"
          if (Test-Path $testEvidence) {
            $status = "MSVC unit and architecture labels were evaluated."
          } elseif (Test-Path (Join-Path $env:SAGA_BUILD_DIR "CMakeCache.txt")) {
            $status = "The graph was configured, but Windows test evidence was not produced. Inspect the build and CTest steps."
          } else {
            $status = "Windows tests did not start because dependency resolution or graph configuration failed."
          }
          @"
          ## C++ Windows core

          $status Integration, timing-sensitive, slow, stress, GPU, and private white-box labels are excluded.
          "@ | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
