# SPDX-License-Identifier: MPL-2.0
name: Export Tool Mirrors

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: export-tools-${{ github.ref }}
  cancel-in-progress: false

jobs:
  export:
    name: Export changed tools
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          fetch-depth: 0

      - name: Restore export state
        id: export-state-cache
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: .core/export/state
          key: tool-export-state-${{ runner.os }}-${{ github.ref_name }}-${{ github.sha }}
          restore-keys: |
            tool-export-state-${{ runner.os }}-${{ github.ref_name }}-

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Check mirror token
        id: mirror-token
        env:
          MIRROR_TOKEN: ${{ secrets.MIRROR_TOKEN }}
        run: |
          if [ -n "$MIRROR_TOKEN" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Export changed tools
        if: steps.mirror-token.outputs.available == 'true'
        env:
          MIRROR_TOKEN: ${{ secrets.MIRROR_TOKEN }}
        run: scripts/export --since "${{ github.event.before }}"

      - name: Skip export without mirror token
        if: steps.mirror-token.outputs.available != 'true'
        run: echo "::warning::MIRROR_TOKEN is not configured; skipping tool mirror export."

      - name: Save export state
        if: always() && steps.mirror-token.outputs.available == 'true' && steps.export-state-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: .core/export/state
          key: tool-export-state-${{ runner.os }}-${{ github.ref_name }}-${{ github.sha }}

      - name: Publish export summary
        if: always()
        shell: bash
        run: |
          {
            echo "## Tool mirror export"
            echo
            echo "Mirror token available: ${{ steps.mirror-token.outputs.available }}"
            echo "A missing token is reported as an explicit skip; export failures are not suppressed."
          } >> "$GITHUB_STEP_SUMMARY"
