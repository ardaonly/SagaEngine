name: Prism CI

on:
  push:
    paths:
      - 'Tools/Prism/**'
  pull_request:
    paths:
      - 'Tools/Prism/**'

jobs:
  python-tests:
    name: Python wrapper tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run Prism tests
        run: python3 Tools/Prism/tests/run.py

      - name: Check Python-only bootstrap
        run: python3 Tools/Prism/build.py --skip-extractor --run-tests

  extractor-build:
    name: Extractor build and example smoke
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install LLVM / Clang
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            clang-18 \
            llvm-18-dev \
            libclang-18-dev \
            zlib1g-dev \
            libxml2-dev \
            libffi-dev

      - name: Build Prism
        env:
          CC: clang-18
          CXX: clang++-18
        run: |
          python3 Tools/Prism/build.py --run-tests \
            --llvm-dir /usr/lib/llvm-18/lib/cmake/llvm \
            --clang-dir /usr/lib/llvm-18/lib/cmake/clang

      - name: Configure minimal example
        run: |
          cmake \
            -S Tools/Prism/examples/minimal \
            -B Tools/Prism/examples/minimal/build \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON

      - name: Run Prism on minimal example
        run: |
          export PATH="$PWD/Tools/Prism/bin:$PATH"
          prism run \
            --repo-root Tools/Prism/examples/minimal \
            -p Tools/Prism/examples/minimal/build \
            -o Tools/Prism/examples/minimal/.prism/prism.raw.json \
            --out-dir Tools/Prism/examples/minimal/.prism \
            --no-txt

      - name: Validate example graph
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path

          graph_path = Path("Tools/Prism/examples/minimal/.prism/prism.graph.json")
          graph = json.loads(graph_path.read_text(encoding="utf-8"))

          assert graph["schema_version"] == "1.0"
          assert graph["stats"]["total_symbols"] > 0
          assert "PrismExample::SampleComponent" in {
              node["qualified_name"]
              for node in graph["symbols"].values()
          }
          PY
