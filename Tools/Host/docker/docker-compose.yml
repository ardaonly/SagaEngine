services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ${SAGA_HOST_POSTGRES_DB:-saga}
      POSTGRES_USER: ${SAGA_HOST_POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${SAGA_HOST_POSTGRES_PASSWORD:-postgres}
    ports:
      - "${SAGA_HOST_POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "${SAGA_HOST_REDIS_PORT:-6379}:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
