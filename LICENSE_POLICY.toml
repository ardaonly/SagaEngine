# Transitional machine-readable licensing policy.
# Target licenses are non-effective until dedicated migration records exist.

schema_version = 3
policy_revision = "1.0"
policy_status = "active"
repository_state = "transitional"
reviewed_branch = "main"
reviewed_commit = "f805fc54ca480f1a3cc896051d634cd2bdeef8a3"
reviewed_project_version = "0.0.11"
review_record_paths = [
  ".github/workflows/licensing.yml",
  "LICENSE_POLICY.toml",
  "SHA256SUMS",
  "Tests/Contract/InstalledConsumer/SagaGraphicsInstalledConsumerTest.cmake",
  "Tools/Licensing/validate_license_policy.py",
  "cmake/modules/SagaInstallGraphics.cmake",
  "LICENSES/THIRD_PARTY_NOTICES.md",
  "CONTRIBUTING.md",
  "LICENSE",
  "Tools/Developer/BoundaryCheck/Policies/path_rules.json",
  "SagaWiki/pages/licensing.html",
]
decision_record = "LIC-DEC-0001"
effective_from_commit = "8a39e5fbfc3fa9c687dde14a033d6c795763946b"
approved_by = ["Arda Koyuncu"]

[validation]
path_format = "repository-relative-posix"
case_sensitive = true
include_untracked_nonignored = true
unclassified_action = "report"
overlap_action = "deny"
unknown_field_action = "deny"
metadata_conflict_action = "deny"
unresolved_license_action = "report"
cmake_graph_action = "report"
legacy_policy_conflict_action = "deny"
rename_domain_change_action = "report"
lfs_pointer_action = "deny"
orphan_required_rule_action = "report"
external_symlink_action = "deny"
submodule_inherits_parent_policy = false
submodule_missing_action = "report"
target_drift_action = "report"
governance_missing_action = "deny"
untracked_exclude_patterns = [".saga-private/**", "Build/**", "build/**", ".agents/**", ".codex/**", ".core/**"]

[metadata]
precedence = [
  "applicable-legal-grant",
  "verified-upstream-terms",
  "embedded-spdx",
  "sidecar",
  "reuse-dep5",
  "effective-migration-record",
  "policy-record",
]
conflict_action = "deny"

[legacy]
path_rules_path = "Tools/Developer/BoundaryCheck/Policies/path_rules.json"
path_rules_status = "deprecated-generated-compatibility"
path_rules_source_of_truth = "LICENSE_POLICY.toml"
duplicate_license_paths = ["LICENSES/LICENSE", "LICENSES/LICENSE-EDITOR"]
notice_path = "LICENSES/NOTICE"
transition_status = "cleanup-complete"
cleanup_status = "complete"
files_are_normative_until_cleanup = false

[governance]
required_documents = [
  "LICENSE",
  "SagaWiki/pages/licensing.html",
  "LICENSES/THIRD_PARTY_NOTICES.md",
]
contributing_document = "CONTRIBUTING.md"
contributing_section_source = "SagaWiki/pages/licensing.html"
contributing_marker_begin = "<!-- SAGA-LICENSING-DCO:BEGIN -->"
contributing_marker_end = "<!-- SAGA-LICENSING-DCO:END -->"
contributing_update_status = "required-before-foundation-commit"

[target_validation]
inventory_status = "reviewed-core"
configured_graph_required_in_report = false
configured_graph_required_in_strict = false
unrecorded_target_patterns = ["Saga*", "saga-*"]
source_domain_comparison = "exact-when-graph-available"
dependency_comparison = "informational"
install_surface_comparison = "declared-vs-file-api"

